<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="_csrf" th:content="${_csrf.token}" />
<meta name="_csrf_header" th:content="${_csrf.headerName}" />
<meta name="endpoint" content="/reports/incentive-user" />
<meta name="url-users" content="/api/users/all" />
<meta name="url-apurationTypes" content="/api/apurationTypes/all" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/styles/navbar-custom.css}">
<link rel="stylesheet" th:href="@{/styles/reports.css}">
<link rel="icon" th:href="@{/images/powerx-icon.png}">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
	rel="stylesheet" />
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
<link
	href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
	rel="stylesheet" />
<title>Incentivo por Usuário</title>
</head>
<body>
	<div th:replace="~{fragments/navbar :: navbar}"></div>
	<div th:replace="~{fragments/sidebar-reports :: sidebar-reports}"></div>

	<div class="main-content">
		<div class="container-fluid mt-4">
			<h2>Incentivo por Usuário</h2>
			<div class="mb-3 half-width">
				<label for="startDate" class="form-label"><strong>Data
						Inicial</strong></label>
				<div class="input-group">
					<span class="input-group-text"><i
						class="bi bi-calendar-date"></i></span> <input type="text" data-report-field="startDate"
						class="form-control" placeholder="dd/mm/aaaa" data-required="true" readonly />
				</div>
				<label for="endDate" class="form-label"><strong>Data
						Final</strong></label>
				<div class="input-group">
					<span class="input-group-text"><i
						class="bi bi-calendar-date"></i></span> <input type="text" data-report-field="endDate"
						class="form-control" placeholder="dd/mm/aaaa" data-required="true" readonly />
				</div>
			</div>
			<div class="mb-3 half-width">
				<label for="users" class="form-label"><strong>Usuário</strong></label>
				<select data-report-field="users" class="form-select select2" data-required="true" multiple>
				</select>
			</div>
			<div class="mb-3 half-width">
				<label for="apurationTypes" class="form-label"><strong>Tipo
						de Apuração</strong></label> <select data-report-field="apurationTypes"
					class="form-select select2" data-required="true" multiple>
				</select>
			</div>
			<div class="mb-3 half-width">
				<label for="fileFormat" class="form-label"><strong>Formato
						do Arquivo</strong></label> <select data-report-field="fileFormat" 
						class="form-select" data-required="true">
					<option value="PDF">PDF</option>
					<option value="XLSX">XLSX</option>
				</select>
			</div>
		</div>
		<div class="mb-3 rigth-placed half-width">
			<button type="button" class="btn btn-primary" id="generateButton">Gerar
				Relatório</button>
		</div>
		<div class="modal fade" id="errorModal" tabindex="-1"
			aria-labelledby="errorModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="errorModalLabel">Erro</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"
							aria-label="Fechar"></button>
					</div>
					<div class="modal-body">
						<p id="errorMessage"></p>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-secondary"
							data-bs-dismiss="modal">Fechar</button>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
	<script th:src="@{/js/reports.js}"></script>
	<script th:src="@{/js/datePicker-init.js}"></script>
</body>
</html>
