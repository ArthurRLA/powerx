<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Relatório de Incentivos</title>
<meta charset="UTF-8">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">
<link rel="stylesheet" th:href="@{/styles/navbar-custom.css}">
<link rel="stylesheet" th:href="@{/styles/sidebar-custom.css}">
<link rel="icon" th:href="@{/images/powerx-icon.png}"
	type="image/x-icon">
</head>
<body class="container mt-5">
	<div th:replace="~{fragments/navbar :: navbar}"></div>
	<br>
	<h2>Gerar Relatório de Incentivos</h2>

	<form th:action="@{/incentives/report/generate}" method="get"
		class="row g-3">
		<div class="col-md-3">
			<label for="inicio" class="form-label">Data Início</label> <input
				type="date" class="form-control" id="inicio" name="inicio" required>
		</div>
		<div class="col-md-3">
			<label for="fim" class="form-label">Data Fim</label> <input
				type="date" class="form-control" id="fim" name="fim" required>
		</div>

		<div class="col-md-3">
			<label for="state" class="form-label">Região (Estado)</label> <select
				class="form-select" id="state" name="state">
				<option value="" selected>-- Todos --</option>
				<option th:each="s : ${states}" th:value="${s}" th:text="${s}"></option>
			</select>
		</div>

		<div class="col-md-3">
			<label for="userId" class="form-label">RCA (Usuário)</label> <select
				class="form-select" id="userId" name="userId">
				<option value="" selected>-- Todos --</option>
				<option th:each="user : ${users}" th:value="${user.id}"
					th:text="${user.name}"></option>
			</select>
		</div>

		<div class="col-md-4">
			<label for="customerId" class="form-label">Cliente</label> <select
				class="form-select" id="customerId" name="customerId">
				<option value="" selected>-- Todos --</option>
				<option th:each="cust : ${customers}" th:value="${cust.id}"
					th:text="${cust.fantasyName}"></option>
			</select>
		</div>

		<div class="col-md-4">
			<label for="groupId" class="form-label">Grupo</label> <select
				class="form-select" id="groupId" name="groupId">
				<option value="" selected>-- Todos --</option>
				<option th:each="g : ${groups}" th:value="${g.id}"
					th:text="${g.name}"></option>
			</select>
		</div>

		<div class="col-12 mt-3">
			<button type="submit" class="btn btn-primary">Gerar PDF</button>
		</div>
	</form>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
</body>
</html>
