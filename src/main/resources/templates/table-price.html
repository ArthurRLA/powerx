<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="utf-8">
<meta name="_csrf" th:content="${_csrf.token}">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">
<link
	href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/css/select2.min.css"
	rel="stylesheet" />
<link rel="stylesheet" th:href="@{/styles/navbar-custom.css}">
<link rel="stylesheet" th:href="@{/styles/sidebar-custom.css}">
<link rel="stylesheet" th:href="@{/styles/table-prices.css}">
<link rel="icon" th:href="@{/images/powerx-icon.png}"
	type="image/x-icon">
<title>Tabela de Preço</title>
</head>
<body>
	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container-fluid" style="margin-top: 60px">
		<div class="row">
			<div class="col-md-2 d-none d-md-block sidebar-wrapper"
				th:replace="~{fragments/sidebar :: sidebar}"></div>

			<div style="display: flex; flex-direction: column; margin-top: 10px;"
				class="col-md-10 offset-md-2 content-main">

				<div class="col-md-10 fill-container">
					<div th:if="${error}">
						<p>
							<span th:text="${error}"></span>
						</p>
					</div>
					<div class="container mt-4">
						<h1>Tabela de preço</h1>

						<div class="d-flex justify-content-start mb-3">
							<button type="button" class="btn btn-primary me-2"
								data-bs-toggle="modal" data-bs-target="#newTablePriceModal">Nova
								Tabela de preço</button>
							<button type="button" class="btn btn-success mx-2"
								data-bs-toggle="modal" data-bs-target="#staticBackdrop">
								Tabela de preço por planilha</button>
							<button type="button"
								class="btn btn-secondary me-2 filter-employee"
								data-bs-toggle="modal" data-bs-target="#filterModal">Filtrar
								Itens</button>
							<button type="button" class="btn btn-secondary nav-link-custom"
								onclick="clearTablePricesFilter()">Limpar Filtros</button>
						</div>
						<div class="input-group w-auto mb-3" style="max-width: 28rem;">
							<span class="input-group-text" aria-hidden="true"><svg
									xmlns="http://www.w3.org/2000/svg" width="16" height="16"
									fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
									<path
										d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" /></svg></span>
							<input type="text" class="form-control" id="searchByName"
								placeholder="Pesquisar"
								data-search-url="/api/crud-table-search/table-prices"
								data-search-kind="table-prices"
								data-tbody-selector="#crudSearchTbody"
								data-pagination-selector="#table-price-pagination"
								oninput="searchByName()">
						</div>


						<div id="table-prices-table">
							<div>
								<table class="table mt-3 table-straped">
									<thead>
										<tr>
											<th>Cliente</th>
											<th>Produto</th>
											<th>Preço</th>
											<th>Ações</th>
										</tr>
									</thead>
									<tbody id="crudSearchTbody">

										<tr th:each="tablePrice : ${tablePrices}">
											<td th:text="${tablePrice.customer.fantasyName}"></td>
											<td
												th:text="${tablePrice.product.productCode} + '  ' + ${tablePrice.product.productName}"></td>
											<td th:text="${tablePrice.price}"></td>
											<td class="d-flex gap-2">
												<button type="button" class="btn btn-info"
													th:data-table-price-id="${tablePrice.id}"
													data-bs-toggle="modal"
													data-bs-target="#viewTablePriceModal">Visualizar</button>
												<button type="button" class="btn btn-warning"
													th:data-table-price-id="${tablePrice.id}"
													data-bs-toggle="modal"
													data-bs-target="#editTablePriceModal">Editar</button>
											</td>
										</tr>
									</tbody>
								</table>
							</div>
							<div class="d-flex justify-content-center mt-3">
								<ul class="pagination" id="table-price-pagination">
									<li class="page-item"
										th:classappend="${currentPage == 0} ? 'disabled'"><a
										class="page-link"
										th:href="@{/table-prices(page=${currentPage - 1}, size=50)}">Anterior</a>
									</li>
									<li class="page-item"
										th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
										th:classappend="${i == currentPage} ? 'active'"><a
										class="page-link"
										th:href="@{/table-prices(page=${i}, size=50)}"
										th:text="${i + 1}"></a></li>
									<li class="page-item"
										th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
										<a class="page-link"
										th:href="@{/table-prices(page=${currentPage + 1}, size=50)}">Próximo</a>
									</li>
								</ul>
							</div>
						</div>
					</div>



					<div class="modal fade" id="newTablePriceModal" tabindex="-1"
						aria-labelledby="newTablePriceModalLabel" aria-hidden="true">
						<div class="modal-dialog modal-dialog-scrollable">
							<div class="modal-content">
								<div class="modal-header">
									<h5 class="modal-title" id="newTablePriceModalLabel">Registrar
										Tabela de Preço</h5>
									<button type="button" class="btn-close" data-bs-dismiss="modal"
										aria-label="Close"></button>
								</div>
								<div class="modal-body">

									<form th:action="@{/table-prices/save}" method="post">
										<div class="mb-3">
											<label for="newCustomer" class="form-label">Selecione
												o Cliente</label> <select class="form-select" name="customer"
												required>
												<option th:each="customer : ${customers}"
													th:value="${customer.id}" th:text="${customer.fantasyName}"></option>
											</select>
										</div>
										<div class="mb-3">
											<label for="newProduct" class="form-label">Selecione
												o Produto</label> <select class="form-select" name="product"
												required>
												<option th:each="product : ${products}"
													th:value="${product.id}"
													th:text="${product.productCode} + ' ' + ${product.productName}"></option>
											</select>
										</div>
										<div class="mb-3">
											<label for="newPrice" class="form-label">Informe o
												Valor</label> <input type="number" class="form-control" name="price"
												placeholder="R$" step="any" required>
										</div>
										<div class="mb-3">
											<button type="button" class="btn btn-secondary"
												data-bs-dismiss="modal">Cancelar</button>
											<button type="submit" class="btn btn-primary">Salvar</button>
										</div>
										<input type="hidden" th:name="${_csrf.parameterName}"
											th:value="${_csrf.token}" />
									</form>
								</div>
							</div>
						</div>
					</div>

					<div class="modal fade" id="staticBackdrop"
						data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
						aria-labelledby="staticBackdropLabel" aria-hidden="true">
						<div class="modal-dialog">
							<div class="modal-content">
								<div class="modal-header">
									<h1 class="modal-title fs-5" id="staticBackdropLabel">Selecione
										uma planilha</h1>
									<button type="button" class="btn-close" data-bs-dismiss="modal"
										aria-label="Close"></button>
								</div>
								<form method="POST" action="/table-prices/save/spreadsheet"
									enctype="multipart/form-data">
									<input type="hidden" th:name="${_csrf.parameterName}"
										th:value="${_csrf.token}" /> <input type="file" name="file"
										accept=".xlsx" />
									<button type="submit">Enviar</button>
								</form>
								<div class="modal-footer">
									<button type="button" class="btn btn-secondary"
										data-bs-dismiss="modal">Close</button>
								</div>
							</div>
						</div>
					</div>


					<div class="modal fade" id="viewTablePriceModal" tabindex="-1"
						aria-labelledby="viewTablePriceModalLabel" aria-hidden="true">
						<div class="modal-dialog modal-dialog-scrollable">
							<div class="modal-content">
								<div class="modal-header">
									<h5 class="modal-title" id="viewTablePriceModalLabel">
										Visualizar Tabela de Preço</h5>
									<button type="button" class="btn-close" data-bs-dismiss="modal"
										aria-label="Close"></button>
								</div>
								<div class="modal-body">
									<div id="loadingTablePriceViewDetails" class="custom-loading"
										style="display: none;">
										<div class="dot-pulse"></div>
										<span class="loading-text">Carregando informações...</span>
									</div>
									<div id="tablePriceViewDetails" style="display: none;">
										<div class="mb-3">
											<p>
												<strong>Id: </strong><span id="table-price-id"></span>
											</p>
										</div>

										<div class="mb-3">
											<p>
												<strong>Cliente: </strong><span id="table-price-customer"></span>
											</p>
										</div>

										<div class="mb-3">
											<p>
												<strong>Produto: </strong><span id="table-price-product"></span>
											</p>
										</div>

										<div class="mb-3">
											<p>
												<strong>Valor: </strong><span id="table-price-price"></span>
											</p>
										</div>
									</div>

									<div class="mb-3 text-end">
										<button type="button" class="btn btn-secondary"
											data-bs-dismiss="modal">Fechar</button>
									</div>

								</div>
							</div>
						</div>
					</div>



					<div class="modal fade" id="editTablePriceModal" tabindex="-1"
						aria-labelledby="editTablePriceModalLabel" aria-hidden="true">
						<div class="modal-dialog modal-dialog-scrollable">
							<div class="modal-content">
								<div class="modal-header">
									<h5 class="modal-title" id="editTablePriceModalLabel">Editar
										Tabela</h5>
									<button type="button" class="btn-close" data-bs-dismiss="modal"
										aria-label="Close"></button>
								</div>
								<div class="modal-body">
									<div id="loadingTablePriceInfosToEdit" class="custom-loading"
										style="display: none;">
										<div class="dot-pulse"></div>
										<span class="loading-text">Carregando informações...</span>
									</div>
									<div id="tablePriceInfosToEdit" style="display: none;">
										<form id="edit-table-price-form"
											action="/table-prices/update/{id}(id=0)" method="post">
											<input type="hidden" name="id" id="edit-id" required>
											<div class="mb-3">
												<label for="editCustomer" class="form-label">Selecione
													o Cliente</label> <select class="form-select" name="customer"
													id="edit-customer-select" required>
													<option selected disabled value="default">Selecione
														um cliente</option>
												</select>
											</div>
											<div class="mb-3">
												<label for="editProduct" class="form-label">Selecione
													o Produto</label> <select class="form-select" name="product"
													id="edit-product-select" required>
													<option selected disabled value="default">Selecione
														um produto</option>
												</select>
											</div>
											<div class="mb-3">
												<label for="newPrice" class="form-label">Informe o
													Valor</label> <input type="number" class="form-control"
													name="price" placeholder="R$" step="any"
													id="edit-price-input" required>
											</div>
											<div class="mb-3">
												<button type="button" class="btn btn-secondary"
													data-bs-dismiss="modal">Cancelar</button>
												<button type="submit" class="btn btn-primary">Salvar</button>
											</div>
											<input type="hidden" th:name="${_csrf.parameterName}"
												th:value="${_csrf.token}" />
										</form>
									</div>
								</div>
							</div>
						</div>
					</div>

					<div class="modal fade" id="filterModal" tabindex="-1"
						aria-labelledby="filterModalLabel" aria-hidden="true">
						<div class="modal-dialog modal-dialog-scrollable">
							<div class="modal-content">
								<div class="modal-header">
									<h5 class="modal-title" id="filterModalLabel">Filtrar
										Premiados</h5>
									<button type="button" class="btn-close" data-bs-dismiss="modal"
										aria-label="Close"></button>
								</div>
								<div class="modal-body">
									<form id="filterForm" action="employees/filter" method="post">
										<div class="mb-3">
											<label for="filterCustomer" class="form-label">Filtrar
												por Cliente</label> <select class="form-select" id="filterCustomer"
												name="customers" multiple>
												<option th:each="customer : ${customers}"
													th:value="${customer.id	}"
													th:text="${customer.fantasyName}"></option>
											</select>
										</div>

										<div class="mb-3">
											<button type="button" class="btn btn-secondary"
												data-bs-dismiss="modal">Fechar</button>
											<button type="button" class="btn btn-primary"
												id="filterButton" onclick="applyTablePriceFilters()">Aplicar
												Filtros</button>
										</div>
										<input type="hidden" th:name="${_csrf.parameterName}"
											th:value="${_csrf.token}" />
									</form>
								</div>
							</div>
						</div>
					</div>

					<div class="modal fade" id="errorModal" tabindex="-1"
						aria-labelledby="errorModalLabel" aria-hidden="true">
						<div class="modal-dialog">
							<div class="modal-content">
								<div class="modal-header">
									<h5 class="modal-title" id="errorModalLabel">Erro</h5>
									<button type="button" class="btn-close" data-bs-dismiss="modal"
										aria-label="Fechar"></button>
								</div>
								<div class="modal-body">
									<p id="errorMessage"></p>
								</div>
								<div class="modal-footer">
									<button type="button" class="btn btn-secondary"
										data-bs-dismiss="modal">Fechar</button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>


	<script th:src="@{/js/search.js}"></script>
	<script src="https://code.jquery.com/jquery-3.6.4.min.js"
		integrity="sha384-UG8ao2jwOWB7/oDdObZc6ItJmwUkR/PfMyt9Qs5AwX7PsnYn1CRKCTWyncPTWvaS"
		crossorigin="anonymous"></script>
	<script
		src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/js/select2.min.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
	<script th:src="@{/js/loadTablePriceInfos.js}"></script>

</body>
</html>
