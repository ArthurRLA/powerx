<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="utf-8">
<meta name="_csrf" th:content="${_csrf.token}">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">
<link rel="stylesheet" th:href="@{/styles/navbar-custom.css}">
<link rel="stylesheet" th:href="@{/styles/sidebar-custom.css}">
<link rel="icon" th:href="@{/images/powerx-icon.png}" type="image/x-icon">
<title>Métodos de Pagamento</title>
</head>
<body>
	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container-fluid" style="margin-top: 60px">
		<div class="row">
			<div class="col-md-2 d-none d-md-block sidebar-wrapper"
				th:replace="~{fragments/sidebar :: sidebar}"></div>
			
			<div style="display: flex; flex-direction: column; margin-top: 10px;"
				class="col-md-10 offset-md-2 content-main">

				<div class="col-md-10 fill-container">
					<div th:if="${error}">
						<p>
							<span th:text="${error}"></span>
						</p>
					</div>
					<div class="container mt-4">
						<h1>Métodos de Pagamento</h1>

						<div class="d-flex justify-content-start mb-3">
							<button type="button" class="btn btn-primary me-2"
								data-bs-toggle="modal" data-bs-target="#newPaymentModal">Novo
								Método</button>

						</div>
						<div class="input-group w-auto mb-3" style="max-width: 28rem;">
							<span class="input-group-text" aria-hidden="true"><svg
									xmlns="http://www.w3.org/2000/svg" width="16" height="16"
									fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
									<path
										d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" /></svg></span>
							<input type="text" class="form-control" id="searchByName"
								placeholder="Pesquisar"
								data-search-url="/api/crud-table-search/payments"
								data-search-kind="payments"
								data-tbody-selector="#crudSearchTbody"
								data-pagination-selector="#payment-pagination"
								oninput="searchByName()">
						</div>


						<div>
							<table class="table mt-3 table-straped">
								<thead>
									<tr>
										<th>ID</th>
										<th>Nome</th>
										<th>Ações</th>
									</tr>
								</thead>
								<tbody id="crudSearchTbody">

									<tr th:each="payment : ${payments}">
										<td th:text="${payment.id}"></td>
										<td th:text="${payment.name}"></td>
										<td>
											<button type="button" class="btn btn-warning"
												data-bs-toggle="modal"
												th:data-bs-target="'#editPaymentModal' + ${payment.id}">Editar</button>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
					<div class="d-flex justify-content-center mt-3">
						<ul class="pagination" id="payment-pagination">
							<li class="page-item"
								th:classappend="${currentPage == 0} ? 'disabled'"><a
								class="page-link"
								th:href="@{/payments(page=${currentPage - 1}, size=50)}">Anterior</a>
							</li>
							<li class="page-item"
								th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
								th:classappend="${i == currentPage} ? 'active'"><a
								class="page-link" th:href="@{/payments(page=${i}, size=50)}"
								th:text="${i + 1}"></a></li>
							<li class="page-item"
								th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
								<a class="page-link"
								th:href="@{/payments(page=${currentPage + 1}, size=50)}">Próximo</a>
							</li>
						</ul>
					</div>


					<div class="modal fade" id="newPaymentModal" tabindex="-1"
						aria-labelledby="newPaymentModalLabel" aria-hidden="true">
						<div class="modal-dialog modal-dialog-scrollable">
							<div class="modal-content">
								<div class="modal-header">
									<h5 class="modal-title" id="newPaymentModalLabel">Registrar
										Novo Método</h5>
									<button type="button" class="btn-close" data-bs-dismiss="modal"
										aria-label="Close"></button>
								</div>
								<div class="modal-body">

									<form th:action="@{/payments/save}" method="post">
										<div class="mb-3">
											<label for="newName" class="form-label"><Strong>Nome do
												Método</Strong></label> <input type="text" class="form-control" name="name"
												required>
										</div>
										<div class="mb-3">
											<button type="button" class="btn btn-secondary"
												data-bs-dismiss="modal">Cancelar</button>
											<button type="submit" class="btn btn-primary">Salvar</button>
										</div>
										<input type="hidden" th:name="${_csrf.parameterName}"
											th:value="${_csrf.token}" />
									</form>
								</div>
							</div>
						</div>
					</div>


					<div th:each="payment : ${payments}">
						<div class="modal fade" th:id="'editPaymentModal' + ${payment.id}"
							tabindex="-1"
							aria-labelledby="'editPaymentModalLabel' + ${payment.id}"
							aria-hidden="true">
							<div class="modal-dialog modal-dialog-scrollable">
								<div class="modal-content">
									<div class="modal-header">
										<h5 class="modal-title"
											th:id="'editPaymentModalLabel' + ${payment.id}">Editar
											Método</h5>
										<button type="button" class="btn-close"
											data-bs-dismiss="modal" aria-label="Close"></button>
									</div>
									<div class="modal-body">

										<form th:action="@{/payments/update/{id}(id=${payment.id})}"
											method="post">
											<input type="hidden" name="id" th:value="${payment.id}"
												required>
											<div class="mb-3">
												<label for="editCode" class="form-label"><Strong>Método</Strong></label> <input
													type="text" class="form-control" th:value="${payment.name}"
													name="name" required>
											</div>
											<div class="mb-3">
												<button type="button" class="btn btn-secondary"
													data-bs-dismiss="modal">Cancelar</button>
												<button type="submit" class="btn btn-primary">Salvar</button>
											</div>
											<input type="hidden" th:name="${_csrf.parameterName}"
												th:value="${_csrf.token}" />
										</form>
									</div>
								</div>
							</div>
						</div>
					</div>

				</div>
			</div>


		</div>
	</div>


	<script th:src="@{/js/search.js}"></script>



	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>

</body>
</html>
