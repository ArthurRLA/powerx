<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Incentivos filtrados</title>
</head>
<body>
	<div th:fragment="filtered-revenues">
		<table class="table mt-3 table-straped" id="tableBody">
			<thead>
				<tr>
					<th>Data</th>
					<th>Nota Fiscal</th>
					<th>Natureza</th>
					<th>Cliente</th>
					<th>Valor</th>
					<th>Ações</th>
				</tr>
			</thead>
			<tbody id="revenuesTableBody">

				<tr th:each="revenue : ${revenues}">
					<td th:text="${revenue.date}"></td>
					<td th:text="${revenue.invoiceNumber}"></td>
					<td th:text="${revenue.operationType}"></td>
					<td th:text="${revenue.customer?.fantasyName}"></td>
					<td th:text="${revenue.total}"></td>
					<td>
						<button type="button" class="btn btn-primary"
							th:data-revenue-id="${revenue.id}" data-bs-toggle="modal"
							data-bs-target="#revenueDetailsModal">Visualizar</button>
						<button type="button" class="btn btn-warning"
							data-bs-toggle="modal" data-bs-target="#editRevenueModal"
							th:data-revenue-id="${revenue.id}">Editar</button>
					</td>
				</tr>
			</tbody>
		</table>
		<div class="d-flex justify-content-center mt-3">
			<ul class="pagination">
				<li class="page-item"
					th:classappend="${currentPage == 0} ? 'disabled'"><a
					class="page-link" href="#"
					th:data-url="@{'/revenues/filter'(
             start=${start},
             end=${end},
             userIds=${userIds},
             customerIds=${customerIds},
             groupIds=${customerIds},
             operationTypes=${customerIds},
             page=${currentPage - 1},
             size=${size}
           )}">
						Anterior </a></li>
				<li class="page-item"
					th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
					th:classappend="${i == currentPage} ? 'active'"><a
					class="page-link" href="#"
					th:data-url="@{'/revenues/filter'(
             start=${start},
             end=${end},
             userIds=${userIds},
             customerIds=${customerIds},
             groupIds=${customerIds},
             operationTypes=${customerIds},
             page=${i},
             size=${size}
           )}"
					th:text="${i + 1}"> </a></li>
				<li class="page-item"
					th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
					<a class="page-link" href="#"
					th:data-url="@{'/revenues/filter'(
             start=${start},
             end=${end},
             userIds=${userIds},
             customerIds=${customerIds},
             groupIds=${customerIds},
             operationTypes=${customerIds},
             page=${currentPage + 1},
             size=${size}
           )}">
						Próximo </a>
				</li>
			</ul>
		</div>
	</div>
</body>
</html>
