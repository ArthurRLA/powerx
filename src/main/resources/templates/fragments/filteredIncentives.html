<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Incentivos filtrados</title>
</head>

<body>
	<div th:fragment="filteredIncentives (customers)">
		<table class="table table-striped" id="tableBody">
			<thead>
				<tr>
					<th scope="col">N° do Documento</th>
					<th scope="col">Mês referência</th>
					<th scope="col">Cliente</th>
					<th scope="col">Detalhes</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="entry : ${documentNumbers}">
					<td th:text="${entry.key}"></td>
					<td th:text="${entry.value.date}"></td>
					<td th:text="${entry.value.customerName}"></td>
					<td>
						<button type="button" class="btn btn-secondary" th:data-document-number="${entry.key}"
							onclick="loadDocumentDetails(this)">Detalhes</button>
						<button sec:authorize="hasRole('ADMIN')" type="button" class="btn btn-warning"
							th:data-document-number="${entry.key}"
							onclick="loadDocumentDetailsToEdit(this)">Editar</button>
					</td>
				</tr>
			</tbody>
		</table>
		<div class="d-flex justify-content-center mt-3">
			<ul class="pagination">
				<li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'"><a class="page-link" href="#"
						th:data-url="@{'/incentives/filter'(
             start=${start},
             end=${end},
             userIds=${userIds},
             customerIds=${customerIds},
             page=${currentPage - 1},
             size=${size}
           )}">
						Anterior </a></li>
				<li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
					th:classappend="${i == currentPage} ? 'active'"><a class="page-link" href="#" th:data-url="@{'/incentives/filter'(
             start=${start},
             end=${end},
             userIds=${userIds},
             customerIds=${customerIds},
             page=${i},
             size=${size}
           )}" th:text="${i + 1}"> </a></li>
				<li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
					<a class="page-link" href="#" th:data-url="@{'/incentives/filter'(
             start=${start},
             end=${end},
             userIds=${userIds},
             customerIds=${customerIds},
             page=${currentPage + 1},
             size=${size}
           )}">
						Próximo </a>
				</li>
			</ul>
		</div>
	</div>
</body>

</html>
