<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<title>Incentivos filtrados</title>
</head>

<body>
	<div th:fragment="filteredIncentives (customers)">
		<table class="table table-striped" id="tableBody">
			<thead>
				<tr>
					<th scope="col">N° do Documento</th>
					<th scope="col">Mês referência</th>
					<th scope="col">Cliente</th>
					<th scope="col">Status</th>
					<th scope="col">Ações</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="entry : ${documentNumbers}">
					<td th:text="${entry.key}"></td>
					<td th:text="${entry.value.date}"></td>
					<td th:text="${entry.value.customerName}"></td>
					<td>
						<span th:if="${entry.value.status.name() == 'PENDING'}" class="badge bg-warning text-dark">
							<i class="bi bi-clock"></i> Pendente
						</span>
						<span th:if="${entry.value.status.name() == 'APPROVED'}" class="badge bg-success">
							<i class="bi bi-check-circle"></i> Aprovado
						</span>
					</td>
					<td>
						<button type="button" class="btn btn-secondary btn-sm" th:data-document-number="${entry.key}"
							onclick="loadDocumentDetails(this)" title="Detalhes">
							<i class="bi bi-info-circle"></i>
						</button>
						<button sec:authorize="hasRole('ADMIN')" type="button" class="btn btn-warning btn-sm"
							th:data-document-number="${entry.key}"
							onclick="loadDocumentDetailsToEdit(this)" title="Editar">
							<i class="bi bi-pencil"></i>
						</button>
						<button th:if="${entry.value.status.name() == 'PENDING'}" 
								sec:authorize="hasRole('ADMIN')" 
								type="button" 
								class="btn btn-success btn-sm"
								th:data-document-number="${entry.key}"
								onclick="approveDocument(this.getAttribute('data-document-number'))" 
								title="Aprovar">
							<i class="bi bi-check"></i>
						</button>
					</td>
				</tr>
			</tbody>
		</table>
		<div class="d-flex justify-content-center mt-3">
			<ul class="pagination">
				<li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'"><a class="page-link" href="#"
						th:data-url="@{'/incentives/filter'(
             start=${start},
             end=${end},
             userIds=${userIds},
             customerIds=${customerIds},
             status=${status},
             page=${currentPage - 1},
             size=${size}
           )}">
						Anterior </a></li>
				<li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
					th:classappend="${i == currentPage} ? 'active'"><a class="page-link" href="#" th:data-url="@{'/incentives/filter'(
             start=${start},
             end=${end},
             userIds=${userIds},
             customerIds=${customerIds},
             status=${status},
             page=${i},
             size=${size}
           )}" th:text="${i + 1}"> </a></li>
				<li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
					<a class="page-link" href="#" th:data-url="@{'/incentives/filter'(
             start=${start},
             end=${end},
             userIds=${userIds},
             customerIds=${customerIds},
             status=${status},
             page=${currentPage + 1},
             size=${size}
           )}">
						Próximo </a>
				</li>
			</ul>
		</div>
	</div>
</body>

</html>
